<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎂 Birthday Guest List — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      text-align: center;
    }

    .icon { font-size: 3.5rem; margin-bottom: 1rem; }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #111827;
      margin-bottom: .4rem;
    }

    p.subtitle {
      color: #6b7280;
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    .form-group { text-align: left; margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .4rem;
    }

    input[type="password"] {
      width: 100%;
      padding: .75rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    input[type="password"]:focus { border-color: #667eea; }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 10px;
      padding: .65rem 1rem;
      font-size: .85rem;
      margin-bottom: 1.25rem;
      text-align: left;
    }

    .error-msg.visible { display: block; }

    button[type="submit"] {
      width: 100%;
      padding: .85rem;
      background: linear-gradient(135deg, #667eea, #f093fb);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }

    button[type="submit"]:hover { opacity: .9; }
    button[type="submit"]:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎂</div>
    <h1>Birthday Guest List</h1>
    <p class="subtitle">Enter your password to continue</p>

    <div class="error-msg" id="error-msg">⚠️ Wrong password, please try again.</div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autofocus autocomplete="current-password" required />
      </div>
      <button type="submit">Sign in →</button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').classList.add('visible');
    }
  </script>
</body>
</html>
